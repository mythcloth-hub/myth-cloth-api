myth-cloth:
  facebook:
    app-id: "0000"
    app-secret: "1111"
    graph-url: https://localhost:8080/
  import:
    drive-url: http://localhost:8089/test.csv
    file-id: ignored

spring:
  application:
    name: myth-cloth-api

  datasource:
    url: jdbc:h2:mem:mythcclothintgtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
      #ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true   # <- Pretty-print SQL
        show_sql: true     # <- Log SQL to console
        use_sql_comments: false # <- Adds Hibernate comments to queries
  sql:
    init:
      mode: never   # FORCE data.sql to run with 'always'

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # <- Shows query parameters

    org.springframework.security: DEBUG
    org.springframework.security.web: TRACE
    org.springframework.security.authentication: TRACE
    org.springframework.security.authorization: TRACE
