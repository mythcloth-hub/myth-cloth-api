    delete:
      tags: [Permissions]
      summary: Delete permission
      operationId: removePermission
      responses:
        '204':
          description: Permission deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /roles:
    get:
      tags: [Roles]
      summary: List roles
      operationId: retrieveRoles
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Roles]
      summary: Create role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleReq'
      responses:
        '201':
          description: Role created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /roles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Roles]
      summary: Get role by id
      operationId: retrieveRole
      responses:
        '200':
          description: Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Roles]
      summary: Update role
      operationId: updateRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleReq'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /roles/{roleId}/permissions:
    parameters:
      - $ref: '#/components/parameters/RoleIdPathParam'
    get:
      tags: [Role Permissions]
      summary: List permissions for role
      operationId: retrievePermissionsByRoleId
      responses:
        '200':
          description: Role permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionResp'
        default:
