    delete:
      tags: [Figurine Events]
      summary: Delete figurine event
      operationId: removeEvent
      responses:
        '204':
          description: Event deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/images:
    parameters:
      - $ref: '#/components/parameters/FigurineIdPathParam'
    get:
      tags: [Figurine Images]
      summary: List figurine images
      operationId: retrieveImages
      parameters:
        - in: query
          name: isOfficialImage
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Figurine image URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineImageResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Figurine Images]
      summary: Create figurine image
      operationId: createImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineImageReq'
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineImageResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Figurine Images]
      summary: Delete figurine image
      operationId: removeImage
      parameters:
        - in: query
          name: imageUrl
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: isOfficialImage
          schema:
            type: boolean
            default: true
      responses:
        '204':
          description: Image removed
        default:
          $ref: '#/components/responses/ProblemResponse'

  /collectors/auth/{provider}:
    parameters:
      - $ref: '#/components/parameters/ProviderPathParam'
    post:
      tags: [Collectors]
      summary: Login collector with social provider
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectorLoginReq'
      responses:
        '200':
          description: Collector authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectorLoginResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /permissions:
    get:
      tags: [Permissions]
      summary: List permissions
      operationId: retrievePermissions
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionResp'
        default:
