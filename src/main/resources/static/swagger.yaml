openapi: 3.0.3
info:
  title: Myth Cloth API
  version: 1.0.0
  description: REST API documentation generated from the current controllers and DTOs.
servers:
  - url: /api/v1
    description: Relative to current host
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Anniversaries
  - name: Catalogs
  - name: Distributors
  - name: Figurines
  - name: Figurine Events
  - name: Figurine Images
  - name: Collectors
  - name: Permissions
  - name: Roles
  - name: Role Permissions
  - name: Statistics
  - name: Collections

paths:
  /anniversaries:
    get:
      tags: [Anniversaries]
      summary: List anniversaries
      operationId: retrieveAnniversaries
      responses:
        '200':
          description: List of anniversaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Anniversaries]
      summary: Create anniversary
      operationId: createAnniversary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnniversaryReq'
      responses:
        '201':
          description: Anniversary created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /anniversaries/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Anniversaries]
      summary: Get anniversary by id
      operationId: retrieveAnniversary
      responses:
        '200':
          description: Anniversary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Anniversaries]
      summary: Update anniversary
      operationId: updateAnniversary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnniversaryReq'
      responses:
        '200':
          description: Updated anniversary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Anniversaries]
      summary: Delete anniversary
      operationId: removeAnniversary
      responses:
        '204':
          description: Anniversary deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /catalogs/{catalogType}:
    parameters:
      - $ref: '#/components/parameters/CatalogTypePathParam'
    get:
      tags: [Catalogs]
      summary: List catalog entries by type
      operationId: retrieveCatalogs
      responses:
        '200':
          description: List of catalog entries
          content:
            application/json:
              schema:
