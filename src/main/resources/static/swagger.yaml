    put:
      tags: [Figurines]
      summary: Update figurine
      operationId: updateFigurine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineReq'
      responses:
        '200':
          description: Updated figurine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Figurines]
      summary: Delete figurine
      operationId: deleteFigurine
      responses:
        '204':
          description: Figurine deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/events:
    parameters:
