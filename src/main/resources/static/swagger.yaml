        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Distributors]
      summary: Delete distributor
      operationId: removeDistributor
      responses:
        '204':
          description: Distributor deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines:
    get:
      tags: [Figurines]
      summary: List figurines (paginated)
      operationId: retrieveFigurines
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated figurine result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Figurines]
      summary: Create figurine
      operationId: createFigurine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineReq'
      responses:
        '201':
          description: Figurine created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
