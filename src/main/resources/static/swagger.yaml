                $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /catalogs/{catalogType}/{id}:
    parameters:
      - $ref: '#/components/parameters/CatalogTypePathParam'
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Catalogs]
      summary: Get catalog entry by id
      operationId: retrieveCatalog
      responses:
        '200':
          description: Catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Catalogs]
      summary: Update catalog entry
      operationId: updateCatalog
      requestBody:
        required: true
