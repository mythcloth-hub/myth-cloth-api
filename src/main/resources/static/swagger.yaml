    post:
      tags: [Role Permissions]
      summary: Add permission to role
      operationId: addPermissionToRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionReq'
      responses:
        '204':
          description: Permission added to role
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Role Permissions]
      summary: Sync role permissions
      operationId: syncRolePermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPermissionsReq'
      responses:
        '204':
          description: Role permissions synchronized
        default:
          $ref: '#/components/responses/ProblemResponse'

  /stats:
    get:
      tags: [Statistics]
      summary: Retrieve global figurine statistics
      operationId: retrieveStatistics
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: lineUpId
          schema:
            type: integer
            format: int64
        - in: query
          name: seriesId
          schema:
            type: integer
            format: int64
        - in: query
          name: groupId
          schema:
            type: integer
            format: int64
        - in: query
          name: anniversaryId
          schema:
            type: integer
            format: int64
        - in: query
          name: metalBody
          schema:
            type: boolean
        - in: query
          name: oce
          schema:
            type: boolean
        - in: query
          name: revival
          schema:
            type: boolean
        - in: query
          name: plainCloth
          schema:
            type: boolean
        - in: query
          name: broken
          schema:
            type: boolean
        - in: query
          name: golden
          schema:
            type: boolean
        - in: query
          name: gold
          schema:
            type: boolean
        - in: query
          name: manga
          schema:
            type: boolean
        - in: query
          name: set
          schema:
            type: boolean
        - in: query
          name: articulable
          schema:
            type: boolean
        - in: query
          name: releaseStatus
          schema:
            type: string
      responses:
        '200':
          description: Aggregated statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /stats/releases/years:
    get:
      tags: [Statistics]
      summary: Retrieve yearly release statistics
      operationId: retrieveStatisticsByReleases
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: lineUpId
          schema:
            type: integer
            format: int64
        - in: query
          name: seriesId
          schema:
            type: integer
            format: int64
        - in: query
          name: groupId
          schema:
            type: integer
            format: int64
        - in: query
          name: anniversaryId
          schema:
            type: integer
            format: int64
        - in: query
          name: metalBody
          schema:
            type: boolean
        - in: query
          name: oce
          schema:
            type: boolean
        - in: query
          name: revival
          schema:
            type: boolean
        - in: query
          name: plainCloth
          schema:
            type: boolean
        - in: query
          name: broken
          schema:
            type: boolean
        - in: query
          name: golden
          schema:
            type: boolean
        - in: query
          name: gold
          schema:
            type: boolean
        - in: query
          name: manga
          schema:
            type: boolean
        - in: query
          name: set
          schema:
            type: boolean
        - in: query
          name: articulable
          schema:
            type: boolean
      responses:
        '200':
          description: Yearly release statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YearStatisticsResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /stats/releases/years/{year}:
    parameters:
      - in: path
        name: year
        required: true
        schema:
          type: integer
          format: int32
    get:
      tags: [Statistics]
      summary: Retrieve monthly release statistics for year
      operationId: retrieveStatisticsByYear
      responses:
        '200':
          description: Monthly release statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonthStatisticsResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /stats/prices/releases/years:
    get:
      tags: [Statistics]
      summary: Retrieve yearly release price statistics
      operationId: retrieveYearlyReleasePrices
      parameters:
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: lineUpId
          schema:
            type: integer
            format: int64
        - in: query
          name: seriesId
          schema:
            type: integer
            format: int64
        - in: query
          name: groupId
          schema:
            type: integer
            format: int64
        - in: query
          name: anniversaryId
          schema:
            type: integer
            format: int64
        - in: query
          name: metalBody
          schema:
            type: boolean
        - in: query
          name: oce
          schema:
            type: boolean
        - in: query
          name: revival
          schema:
            type: boolean
        - in: query
          name: plainCloth
          schema:
            type: boolean
        - in: query
          name: broken
          schema:
            type: boolean
        - in: query
          name: golden
          schema:
            type: boolean
        - in: query
          name: gold
          schema:
            type: boolean
        - in: query
          name: manga
          schema:
            type: boolean
        - in: query
          name: set
          schema:
            type: boolean
        - in: query
          name: articulable
          schema:
            type: boolean
        - in: query
          name: releaseStatus
          schema:
            type: string
      responses:
        '200':
          description: Yearly release price statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YearReleasePriceResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /collections/{collectionId}/figurines/{figurineId}:
    parameters:
      - $ref: '#/components/parameters/CollectionIdPathParam'
      - $ref: '#/components/parameters/FigurineIdPathParam'
    put:
      tags: [Collections]
      summary: Add figurine to collection
      operationId: addFigurineToCollection
      responses:
        '200':
          description: Figurine added to collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

components:
  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    FigurineIdPathParam:
      in: path
      name: figurineId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CatalogTypePathParam:
      in: path
      name: catalogType
      required: true
      schema:
        type: string
        enum: [distributions, groups, lineups, series]
    RoleIdPathParam:
      in: path
      name: roleId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CollectionIdPathParam:
      in: path
      name: collectionId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ProviderPathParam:
      in: path
      name: provider
      required: true
      schema:
        type: string

  responses:
    ProblemResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        timestamp:
          type: string
          format: date-time
        errors:
          type: object
          additionalProperties:
            type: string
        error:
          type: string

    AnniversaryReq:
      type: object
      required: [description, year]
      properties:
        description:
          type: string
          maxLength: 100
        year:
          type: integer
          minimum: 1

    AnniversaryResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        year:
          type: integer

    CatalogReq:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 100

    CatalogResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    DistributorReq:
      type: object
      required: [name, countryCode]
      properties:
        name:
          type: string
          enum: [BANDAI, DAM, DTM, BANDAI_CHINA, DS_DISTRIBUTIONS, BLUE_FIN]
        countryCode:
          type: string
          enum: [JP, MX, ES, US, CN]
        website:
          type: string

    DistributorResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        countryCode:
          type: string
          enum: [JP, MX, ES, US, CN]
        website:
          type: string

    FigurineDistributorReq:
      type: object
      properties:
        supplierId:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          enum: [JPY, MXN, EUR, USD, CNY, CAD]
        price:
          type: number
          format: double
          minimum: 0.01
        announcedAt:
          type: string
          format: date
        preorderOpensAt:
          type: string
          format: date
        releaseDate:
          type: string
          format: date
        releaseDateConfirmed:
          type: boolean
          default: false

    FigurineReq:
      type: object
      required: [name, distributors, lineUpId, seriesId, groupId]
      properties:
        name:
          type: string
          maxLength: 100
        distributors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FigurineDistributorReq'
        tamashiiUrl:
          type: string
        distributionId:
          type: integer
          format: int64
        lineUpId:
          type: integer
          format: int64
        seriesId:
          type: integer
          format: int64
        groupId:
          type: integer
          format: int64
        anniversaryId:
          type: integer
          format: int64
        isMetalBody:
          type: boolean
        isOriginalColorEdition:
          type: boolean
        isRevival:
          type: boolean
        isPlainCloth:
          type: boolean
        isBattleDamaged:
          type: boolean
        isGoldenArmor:
          type: boolean
        isGold24kEdition:
          type: boolean
        isMangaVersion:
          type: boolean
        isMultiPack:
          type: boolean
        isArticulable:
          type: boolean
        notes:
          type: string
        officialImageUrls:
          type: array
          items:
            type: string
        unofficialImageUrls:
          type: array
          items:
            type: string

    FigurineDistributorResp:
      type: object
      properties:
        distributor:
          $ref: '#/components/schemas/DistributorResp'
        currency:
          type: string
          enum: [JPY, MXN, EUR, USD, CNY, CAD]
        price:
          type: number
          format: double
        priceWithTax:
          type: number
          format: double
        announcedAt:
          type: string
          format: date
        preorderOpensAt:
          type: string
          format: date
        releaseDate:
          type: string
          format: date
        releaseDateConfirmed:
          type: boolean

    FigurineEventReq:
      type: object
      required: [description, date, region, type, figurineId]
      properties:
        description:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        region:
          type: string
          enum: [JP, MX, ES, US, CN]
        type:
          type: string
          enum: [ANNOUNCEMENT, PREORDER_OPEN, PREORDER_CLOSE, RELEASE, RESTOCK, LOCAL_CONFIRMATION, LOCAL_RELEASE]
        figurineId:
          type: integer
          format: int64
          minimum: 1

    FigurineEventResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        date:
          type: string
          format: date
        type:
          type: string
          enum: [ANNOUNCEMENT, PREORDER_OPEN, PREORDER_CLOSE, RELEASE, RESTOCK, LOCAL_CONFIRMATION, LOCAL_RELEASE]
        region:
          type: string
          enum: [JP, MX, ES, US, CN]
        description:
          type: string

    FigurineImageReq:
      type: object
      required: [imageUrl, figurineId]
      properties:
        imageUrl:
          type: string
          format: uri
        isOfficialImage:
          type: boolean
          default: true
        figurineId:
          type: integer
          format: int64
          minimum: 1

    FigurineImageResp:
      type: object
      properties:
        officialImageUrls:
          type: array
          items:
            type: string
            format: uri

    FigurineResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayableName:
          type: string
        distributors:
          type: array
          items:
            $ref: '#/components/schemas/FigurineDistributorResp'
        tamashiiUrl:
          type: string
        distribution:
          $ref: '#/components/schemas/CatalogResp'
        lineUp:
          $ref: '#/components/schemas/CatalogResp'
        series:
          $ref: '#/components/schemas/CatalogResp'
        group:
          $ref: '#/components/schemas/CatalogResp'
        anniversary:
          $ref: '#/components/schemas/AnniversaryResp'
        isMetalBody:
          type: boolean
        isOriginalColorEdition:
          type: boolean
        isRevival:
          type: boolean
        isPlainCloth:
          type: boolean
        isBattleDamaged:
          type: boolean
        isGoldenArmor:
          type: boolean
        isGold24kEdition:
          type: boolean
        isMangaVersion:
          type: boolean
        isMultiPack:
          type: boolean
        isArticulable:
          type: boolean
        notes:
          type: string
        officialImageUrls:
          type: array
          items:
            type: string
        unofficialImageUrls:
          type: array
          items:
            type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/FigurineEventResp'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FigurineResp'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    CollectorLoginReq:
      type: object
      properties:
        idToken:
          type: string
        accessToken:
          type: string

    CollectorLoginResp:
      type: object
      properties:
        collectorId:
          type: integer
          format: int64
        displayName:
          type: string
        email:
          type: string
          format: email
        accessToken:
          type: string
        tokenType:
          type: string
        expiresInSeconds:
          type: integer
          format: int64

    RoleReq:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 200

    RoleResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    PermissionReq:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 200
          pattern: '^[a-z0-9_-]+:[a-z0-9_-]+$'

    PermissionResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    RolePermissionReq:
      type: object
