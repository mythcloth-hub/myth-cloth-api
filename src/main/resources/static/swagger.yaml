      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineEventReq'
      responses:
        '200':
          description: Updated figurine event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineEventResp'
        default:
