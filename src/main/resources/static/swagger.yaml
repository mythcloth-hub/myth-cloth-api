    get:
      tags: [Distributors]
      summary: Get distributor by id
      operationId: retrieveDistributor
      responses:
        '200':
          description: Distributor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributorResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Distributors]
      summary: Update distributor
      operationId: updateDistributor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributorReq'
      responses:
        '200':
          description: Updated distributor
          content:
            application/json:
              schema:
