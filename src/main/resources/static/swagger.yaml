    post:
      tags: [Figurine Events]
      summary: Create figurine event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineEventReq'
      responses:
        '201':
          description: Event created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineEventResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/events/{id}:
    parameters:
      - $ref: '#/components/parameters/FigurineIdPathParam'
